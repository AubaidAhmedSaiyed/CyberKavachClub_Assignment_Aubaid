version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: cyberkavach-mongodb
    restart: always
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=cyberkavach_secret

  redis:
    image: redis:alpine
    container_name: cyberkavach-redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  mongodb_data:
  redis_data:
